name: Housing Refresh

on:
  schedule:
    # Monday and Thursday at 12:00 UTC (6am Mountain)
    - cron: '0 12 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run housing refresh
        run: node scripts/housing-refresh.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Gov Hub Bot"
          git config user.email "bot@livabletelluride.org"
          git add -A
          git commit -m "🏠 Housing refresh $(date -u +'%Y-%m-%d')

          Automated: expired listing cleanup and SMRHA check"
          git push
